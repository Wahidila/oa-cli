name: release

# Build OA-cli platform binaries and publish a GitHub Release.
# Trigger: push a tag like `v1.0.0`, or run manually with a version input.
# The binaries are cross-compiled for all targets on a single runner (Bun
# --target), packaged as `oa-cli-<os>-<arch>[...].tar.gz`/`.zip` — exactly the
# names the repo-root `install` script downloads — and uploaded to the release.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version without the leading v (e.g. 1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install

      - name: Resolve version
        id: v
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release (if absent)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          v="v${{ steps.v.outputs.version }}"
          gh release view "$v" --repo "${{ github.repository }}" >/dev/null 2>&1 \
            || gh release create "$v" --repo "${{ github.repository }}" --title "$v" --generate-notes

      # Cross-compiles every target (Bun --target) and, in release mode, packages
      # each dist/oa-cli-<target>/bin into an archive and `gh release upload`s it.
      # No --skip-install: build.ts installs cross-platform native deps
      # (@opentui/core, @parcel/watcher, @ff-labs/fff-bun) needed for cross-compile.
      # --skip-embed-web-ui: OA-cli v1 ships the terminal CLI only, no web dashboard.
      - name: Build binaries and upload to the release
        working-directory: packages/opencode
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          OPENCODE_RELEASE: "1"
          OPENCODE_VERSION: ${{ steps.v.outputs.version }}
        run: bun script/build.ts --skip-embed-web-ui
